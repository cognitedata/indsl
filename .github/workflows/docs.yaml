name: Build and deploy docs

on:
  release:
    types: [created]
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs-source/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yaml'
      - 'indsl/**'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build docs
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --group docs --all-extras

      - name: Regenerate docs CHANGELOG
        run: printf '# Changelog\n\n%s\n' "$(cat CHANGELOG.md)" > docs-source/source/CHANGELOG.md

      - name: Build HTML
        working-directory: docs-source
        run: uv run make html

      - name: Inject Pages metadata
        run: |
          touch docs-source/build/html/.nojekyll
          echo 'indsl.docs.cognite.com' > docs-source/build/html/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-source/build/html

  deploy:
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
